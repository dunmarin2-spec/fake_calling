<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>시스템 설정</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; background: #f0f0f0; overflow: hidden; }
        
        /* 설정 화면 */
        #setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .btn { padding: 20px 40px; font-size: 1.2rem; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; }

        /* 가짜 수신 화면 (기본 숨김) */
        #call-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            display: none; z-index: 9999; flex-direction: column; align-items: center; color: white;
        }

        .caller-info { margin-top: 80px; text-align: center; }
        .caller-name { font-size: 2.5rem; font-weight: bold; margin-bottom: 10px; }
        .call-status { font-size: 1.2rem; opacity: 0.9; }

        .call-actions {
            position: absolute; bottom: 80px; width: 100%;
            display: flex; justify-content: space-around; padding: 0 40px; box-sizing: border-box;
        }

        .action-btn { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; border: none; }
        .decline { background: #ff3b30; }
        .accept { background: #4cd964; }
        
        /* 거절 시 화면 종료 */
        #call-screen.hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h2>탈출용 가짜 전화</h2>
        <p>버튼을 누르면 <b>10초 뒤</b>에 전화가 옵니다.</p>
        <button class="btn" onclick="startTimer()">10초 뒤 전화받기 시작</button>
    </div>

    <div id="call-screen">
        <div class="caller-info">
            <div class="caller-name">엄마</div>
            <div class="call-status">휴대전화</div>
        </div>

        <div class="call-actions">
            <button class="action-btn decline" onclick="endCall()">✖</button>
            <div style="font-size: 0.8rem;">밀어서 거절/수신</div>
            <button class="action-btn accept" onclick="endCall()">📞</button>
        </div>
    </div>

    <audio id="ringtone" loop>
        <source src="https://www.soundjay.com/phone/phone-calling-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const setup = document.getElementById('setup-screen');
        const call = document.getElementById('call-screen');
        const ring = document.getElementById('ringtone');

        function startTimer() {
            alert("타이머가 시작되었습니다. 폰을 내려놓으세요.");
            setup.style.display = 'none';

            // 10초 뒤 전화 화면 띄우기
            setTimeout(() => {
                call.style.display = 'flex';
                // 브라우저 정책상 클릭 이력이 있어야 소리가 남
                ring.play().catch(e => console.log("소리 재생을 위해 화면을 한 번 클릭해야 합니다."));
                
                // 진동 효과
                if (navigator.vibrate) {
                    navigator.vibrate([500, 500, 500, 500, 500]);
                }
            }, 10000);
        }

        function endCall() {
            ring.pause();
            call.style.display = 'none';
            setup.style.display = 'flex';
            if (navigator.vibrate) navigator.vibrate(0);
            alert("상황 종료!");
        }
    </script>
</body>
</html>
