<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>탈출 전화 (PWA)</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; background: #1a1a1a; color: white; overflow: hidden; }
        #setup { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .btn { padding: 20px 50px; font-size: 1.2rem; background: #4facfe; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { padding: 10px; margin: 10px; border-radius: 5px; border: none; text-align: center; }

        /* 가짜 수신 화면 */
        #call-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, #2c3e50, #000000);
            display: none; z-index: 9999; flex-direction: column; align-items: center;
        }
        .caller-name { font-size: 3rem; margin-top: 100px; }
        .call-actions { position: absolute; bottom: 100px; width: 100%; display: flex; justify-content: space-around; }
        .circle { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; border: none; color: white; }
        .red { background: #ff3b30; } .green { background: #4cd964; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>📞 가짜 전화 설정</h1>
        <input type="text" id="callerName" placeholder="발신인 이름 (예: 엄마)" value="엄마">
        <input type="number" id="delay" placeholder="초 뒤에 전화 (예: 10)" value="10">
        <button class="btn" onclick="startTimer()">예약 시작</button>
        <p style="font-size: 0.8rem; color: #888; margin-top: 20px;">* 설치 후 실행하면 더 리얼합니다.</p>
    </div>

    <div id="call-screen">
        <div class="caller-name" id="display-name">엄마</div>
        <div style="font-size: 1.2rem; margin-top: 10px;">휴대전화</div>
        <div class="call-actions">
            <button class="circle red" onclick="endCall()">✖</button>
            <button class="circle green" onclick="endCall()">📞</button>
        </div>
    </div>

    <script>
        // PWA 서비스 워커 등록
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function startTimer() {
            const name = document.getElementById('callerName').value;
            const sec = document.getElementById('delay').value;
            document.getElementById('display-name').innerText = name;

            alert(sec + "초 뒤에 전화가 옵니다. 화면을 끄지 마세요!");
            document.getElementById('setup').style.display = 'none';

            setTimeout(() => {
                document.getElementById('call-screen').style.display = 'flex';
                if (navigator.vibrate) navigator.vibrate([500, 500, 500]);
            }, sec * 1000);
        }

        function endCall() {
            location.reload();
        }
    </script>
</body>
</html>
