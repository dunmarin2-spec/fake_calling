<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>탈출 전화 & 송금</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; background: #1a1a1a; color: white; overflow: hidden; }
        #setup { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; box-sizing: border-box; }
        
        .btn { width: 80%; max-width: 300px; padding: 15px; font-size: 1.1rem; border: none; border-radius: 50px; cursor: pointer; margin: 10px 0; font-weight: bold; transition: 0.2s; }
        .btn-call { background: #4facfe; color: white; }
        /* 카카오페이 브랜드 컬러 적용 */
        .btn-pay { background: #fee500; color: #1a1a1a; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        
        input { width: 80%; max-width: 300px; padding: 12px; margin: 5px; border-radius: 10px; border: 1px solid #444; background: #333; color: white; text-align: center; }
        label { font-size: 0.9rem; color: #aaa; margin-top: 10px; }

        /* 가짜 수신 화면 */
        #call-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, #2c3e50, #000000);
            display: none; z-index: 9999; flex-direction: column; align-items: center;
        }
        .caller-name { font-size: 3rem; margin-top: 100px; }
        .call-actions { position: absolute; bottom: 100px; width: 100%; display: flex; justify-content: space-around; }
        .circle { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; border: none; color: white; }
        .red { background: #ff3b30; } .green { background: #4cd964; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>📱 앱 설정</h1>
        
        <label>발신인 이름</label>
        <input type="text" id="callerName" placeholder="예: 엄마, 팀장님" value="엄마">
        
        <label>예약 시간 (초)</label>
        <input type="number" id="delay" placeholder="예: 10" value="10">
        
        <button class="btn btn-call" onclick="startTimer()">📞 가짜 전화 예약</button>

        <hr style="width: 80%; border: 0.5px solid #333; margin: 20px 0;">

        <a href="https://qr.kakaopay.com/FRK8J0SAD" class="btn btn-pay">
            💛 카카오페이로 응원하기
        </a>
        
        <p style="font-size: 0.75rem; color: #666; margin-top: 15px;">설치 후 실행하면 상단바 없이 사용 가능합니다.</p>
    </div>

    <div id="call-screen">
        <div class="caller-name" id="display-name">엄마</div>
        <div style="font-size: 1.2rem; margin-top: 10px; color: #ccc;">휴대전화</div>
        <div class="call-actions">
            <button class="circle red" onclick="endCall()">✖</button>
            <button class="circle green" onclick="endCall()">📞</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function startTimer() {
            const name = document.getElementById('callerName').value;
            const sec = document.getElementById('delay').value;
            document.getElementById('display-name').innerText = name;

            alert(sec + "초 뒤에 전화가 옵니다. 화면을 켜두세요!");
            document.getElementById('setup').style.display = 'none';

            setTimeout(() => {
                document.getElementById('call-screen').style.display = 'flex';
                if (navigator.vibrate) navigator.vibrate([500, 500, 500, 500]);
            }, sec * 1000);
        }

        function endCall() {
            location.reload();
        }
    </script>
</body>
</html>
